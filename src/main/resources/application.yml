server:
  port: 8080

spring:
  application:
    name: binocheck
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5433}/${DB_NAME:binocheck}}
    driver-class-name: org.postgresql.Driver
    username: ${SPRING_DATASOURCE_USERNAME:${DB_USERNAME:postgres}}
    password: ${SPRING_DATASOURCE_PASSWORD:${DB_PASSWORD:postgres}}
    hikari:
      max-lifetime: 300000        # 5 minutes (Neon closes idle connections)
      keepalive-time: 30000       # ping every 30s to keep connection alive
      connection-timeout: 30000   # 30s timeout when getting a connection
      minimum-idle: 1
      maximum-pool-size: 5
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
  flyway:
    enabled: true
    baseline-on-migrate: true

app:
  github:
    token: ${GITHUB_TOKEN:}
  gemini:
    key: ${GEMINI_API_KEY:}
    model: ${GEMINI_MODEL:gemini-3.5-flash}
